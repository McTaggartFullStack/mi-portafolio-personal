steps:
  # Paso 1: Construir la imagen (latest + commit)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest',
        '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA',
        '.'
      ]

  # Paso 2: Subir imágenes
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA']

  # Paso 3: Desplegar en Cloud Run
  - name: 'gcr.io/google-cloud-sdk:latest'
    entrypoint: gcloud
    args:
      [
        'run', 'deploy', '${_SERVICE_NAME}',
        '--image', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest',
        '--platform', 'managed',
        '--region', '${_REGION}',
        '--set-env-vars', 'NODE_ENV=production',
        '--allow-unauthenticated'
      ]

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'

substitutions:
  _SERVICE_NAME: 'mi-portafolio-personal'
  _REGION: 'us-east1'
