  <!-- Asistente de IA -->
  <style>
    /* Flotante IA */
    #ia-assistant-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #6366f1 0%, #a21caf 100%);
      border-radius: 50%;
      box-shadow: 0 8px 32px 0 rgba(99,102,241,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s, width 0.3s, height 0.3s, border-radius 0.3s;
    }
    #ia-assistant-btn.expanded {
      width: 340px;
      max-width: 95vw;
      height: 340px;
      border-radius: 1.2rem;
      right: 2.5vw;
      bottom: 2.5vw;
      box-shadow: 0 8px 32px 0 rgba(99,102,241,0.25);
      background: #fff;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 0;
    }
    .dark #ia-assistant-btn.expanded {
      background: #18181b;
    }
    @media (max-width: 768px) {
      #ia-assistant-btn.expanded {
        width: 95vw;
      }
    }
    #ia-assistant-btn.expanded .ia-circle-icon {
      display: none;
    }
    #ia-assistant-btn .ia-chat-content {
      display: none;
    }
    #ia-assistant-btn.expanded .ia-chat-content {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 1rem;
    }
    #ia-assistant-btn.expanded .ia-chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: bold;
      color: #6366f1;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .dark #ia-assistant-btn.expanded .ia-chat-header {
      color: #a5b4fc;
    }
    #ia-assistant-btn.expanded .ia-chat-messages {
      flex: 1;
      overflow-y: auto;
      background: #f8fafc;
      border-radius: 0.8rem;
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.97rem;
    }
    .dark #ia-assistant-btn.expanded .ia-chat-messages {
      background: #27272a;
      color: #e5e7eb;
    }
    #ia-assistant-btn.expanded .ia-chat-input {
      display: flex;
      border-top: 1px solid #444;
      background: #fff;
    }
    .dark #ia-assistant-btn.expanded .ia-chat-input {
      background: #18181b;
      border-top: 1px solid #27272a;
    }
    #ia-assistant-btn.expanded .ia-chat-input input {
      flex: 1;
      border: none;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      outline: none;
      background: transparent;
      color: #222;
    }
    .dark #ia-assistant-btn.expanded .ia-chat-input input {
      color: #e5e7eb;
    }
    #ia-assistant-btn.expanded .ia-chat-input button {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 0 1.2rem;
      font-size: 1.2rem;
      border-radius: 0 0 1.2rem 0;
      cursor: pointer;
      transition: background 0.2s;
    }
    #ia-assistant-btn.expanded .ia-chat-input button:hover {
      background: #a21caf;
    }
    .dark #ia-assistant-btn.expanded .ia-chat-input button {
      background: #6366f1;
      color: #fff;
    }
    .dark #ia-assistant-btn.expanded .ia-chat-input button:hover {
      background: #a21caf;
    }
    
    #ia-assistant-btn svg {
      width: 2rem;
      height: 2rem;
      color: #fff;
    }
    @media (max-width: 768px) {
      #ia-assistant-btn {
        display: flex;
      }
    }
    .loading-dots::after {
      content: '';
      display: inline-block;
      width: 1.2em;
      text-align: left;
      animation: loading-dots 1.2s steps(4, end) infinite;
    }
    @keyframes loading-dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }
  </style>
  
  <div id="ia-assistant-btn" title="Habla con FlorIA">
    <span class="ia-circle-icon">
      <img src="assets/img/principal/logoIA.webp" alt="Logo IA" style="width: 58px; height: 58px; border-radius: 50%; object-fit: cover; display: block; box-shadow: 0 2px 8px rgba(0,0,0,0.10);" />
    </span>
    <div class="ia-chat-content">
      <div class="ia-chat-header">
        FlorIA - Tu Asistente Virtual
        <button class="ia-chat-close" style="background:transparent;border:none;color:#6366f1;font-size:1.3rem;cursor:pointer;">×</button>
      </div>
      <div class="ia-chat-messages"></div>
      <div id="recaptcha-container" class="w-full flex justify-center items-center mb-2 mt-2" style="min-height:78px; display:none;">
        <div id="recaptcha-widget" style="width:100%;max-width:320px;min-width:180px;display:flex;justify-content:center;"></div>
      </div>
      <p id="recaptcha-loading" class="loading-dots" style="display:none; margin:0 0 8px 0; text-align:center; font-size:13px; color:#64748b;">
        Cargando captcha, por favor espera...
      </p>
      <form class="ia-chat-input" autocomplete="off">
        <input type="text" placeholder="Escribe tu pregunta..." required />
        <button type="submit">➤</button>
      </form>
    </div>
  </div>
  
  <script>
    
    document.addEventListener('DOMContentLoaded', function() {
      // IA: círculo flotante y chat unificado
      const iaBtn = document.getElementById('ia-assistant-btn');
      if (!iaBtn) return;
      const iaCircleIcon = iaBtn.querySelector('.ia-circle-icon');
      const iaChatContent = iaBtn.querySelector('.ia-chat-content');
      const iaChatHeader = iaBtn.querySelector('.ia-chat-header');
      const iaChatClose = iaBtn.querySelector('.ia-chat-close');
      const iaChatMessages = iaBtn.querySelector('.ia-chat-messages');
      if (!iaCircleIcon || !iaChatContent || !iaChatHeader || !iaChatClose || !iaChatMessages) return;
      iaChatMessages.style.display = 'flex';
      iaChatMessages.style.flexDirection = 'column';
      iaChatMessages.style.gap = '0.3em';
      const iaChatInput = iaBtn.querySelector('.ia-chat-input');
      const iaInput = iaChatInput.querySelector('input');
      const iaSubmitBtn = iaChatInput.querySelector('button[type="submit"]');
      if (!iaChatInput || !iaInput || !iaSubmitBtn) return;

      // Protección extrema: bloquear recarga accidental
      let blockReload = false;
      window.addEventListener('beforeunload', function(e) {
        if (blockReload) {
          e.preventDefault();
          e.returnValue = '';
          return '';
        }
      });

      function isMobile() {
        return window.innerWidth <= 768;
      }

      function setChatVisibility() {
        iaBtn.style.display = 'flex';
        if (!iaBtn.classList.contains('expanded')) {
          iaCircleIcon.style.display = 'flex';
          iaChatContent.style.display = 'none';
        }
      }
      window.addEventListener('resize', setChatVisibility);
      setChatVisibility();

      // Cerrar chat IA al hacer click fuera
      document.addEventListener('mousedown', function(e) {
        if (
          iaBtn.classList.contains('expanded') &&
          !iaBtn.contains(e.target)
        ) {
          iaBtn.classList.remove('expanded');
          iaCircleIcon.style.display = 'flex';
          iaChatContent.style.display = 'none';
          iaChatHeader.style.display = 'none';
          iaChatMessages.style.display = 'none';
          iaChatInput.style.display = 'none';
          iaInput.blur();
          blockReload = false;
        }
      });

      // Abrir chat IA flotante (botón) - compatible y robusto
      iaBtn.addEventListener('click', function(e) {
        // Solo expandir si el click es sobre el círculo, el logo, o el botón flotante

        const isCircle = e.target.classList.contains('ia-circle-icon');
        const isLogo = e.target.tagName === 'IMG' && e.target.closest('.ia-circle-icon');
        const isBtn = e.target === iaBtn;
        if (!iaBtn.classList.contains('expanded') && (isCircle || isLogo || isBtn)) {
          iaBtn.classList.add('expanded');
          iaCircleIcon.style.display = 'none';
          iaChatContent.style.display = 'flex';
          iaChatHeader.style.display = 'flex';
          iaChatMessages.style.display = 'flex';
          iaChatInput.style.display = 'flex';
          iaInput.disabled = false;
          iaInput.style.display = '';
          setTimeout(() => iaInput.focus(), 100);
          blockReload = true;

          const recaptchaContainer = document.getElementById('recaptcha-container');
          if (captchaValidated) {
            if (recaptchaContainer) recaptchaContainer.style.display = 'none';
          } else {
            ensureRecaptchaLoaded();
          }
        }
      });

      // Cerrar chat móvil
      iaChatClose.addEventListener('click', function(e) {
        e.stopPropagation(); // Evita que el click reabra el chat
        if (iaBtn.classList.contains('expanded')) {
          iaBtn.classList.remove('expanded');
          iaCircleIcon.style.display = 'flex';
          iaChatContent.style.display = 'none';
          iaChatHeader.style.display = 'none';
          iaChatMessages.style.display = 'none';
          iaChatInput.style.display = 'none';
          iaInput.blur();
          blockReload = false;
          // Mantener captcha validado hasta que se recargue/reinicie la página
        }
      });

      // FlorIA chat memory implementation + reCAPTCHA
      const SYSTEM_INSTRUCTION = `Eres FlorIA, asistente oficial de webspty Tu misión: vender servicios con respuestas ultra-concisas.\n\nREGLAS DE ORO:\n- Máximo 20 palabras por respuesta a no ser que el usuario pregunte algo, ahi si tu limite es mayor.\n- No hablar del programa de afiliados salvo que lo pidan.\n- Siempre termina con una pregunta relacionada.\n- Solo respondes sobre webspty.dev. Si preguntan otra cosa, di que no puedes ayudar.\n\nSERVICIOS Y PRECIOS:\n- Tarjeta Digital: $125\n- Landing page Express: $250\n- Web Profesional: $480 (SEO + dominio .com gratis 1 año)\n- E-commerce: $1250\n- IA Extra: $150 implementación + $30/mes hosting exclusivo\n\nMANTENIMIENTO:\nPlanes de $30, $50 y $90 mensuales.\n -plan tecnico: 30$ incluye hoosting asociado a tu dominio, actualizaciones de seguridad y soporte técnico.\n -plan seguro: 50$ incluye todo lo del plan técnico más optimizaciones de rendimiento, hosting propio de alto nivel y monitoreo proactivo.\n -plan de crecimiento: 90$ incluye todo lo del plan seguro mas actualizaciones de hasta 3 secciones mensuales, hosting premium con recursos dedicados, plan de IA y soporte prioritario.\n -plan de IA: 30$ incluye el hosting de una inteligencia artificial dedicada al sitio web\n\nAFILIADOS (solo si preguntan):\n- $20 por Tarjeta Digital\n- $40 por Landing page Express\n- $60 por Web Profesional\n- Pago inmediato: efectivo, transferencia o yappy\n\nCONTACTO:\nCarlos Mc Taggart | WhatsApp: +507 6204-9480`;
      let chatHistory = [
        { role: 'user', parts: [{ text: SYSTEM_INSTRUCTION }] }
      ];
      let chatProcessing = false;
  // Generar identificador de sesión único al abrir el chat
  let sessionId = window.crypto && window.crypto.randomUUID ? window.crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).substr(2, 9));

      // reCAPTCHA v2

      let recaptchaWidgetId = null;
      let captchaValidated = false;
      let recaptchaScriptRequested = false;
      let recaptchaSiteKey = null;

      function setRecaptchaLoading(isLoading, message) {
        const recaptchaLoading = document.getElementById('recaptcha-loading');
        if (!recaptchaLoading) return;
        if (typeof message === 'string' && message.trim()) {
          recaptchaLoading.textContent = message;
        }
        recaptchaLoading.style.display = isLoading ? 'block' : 'none';
      }

      async function getRecaptchaSiteKey() {
        if (recaptchaSiteKey) return recaptchaSiteKey;
        const isGithubPages = /github\.io$/i.test(window.location.hostname);
        const isLocal = !window.location.hostname || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const configuredBase = (window.WEBSPTY_API_BASE || '').trim().replace(/\/$/, '');
        const autoBase = isLocal ? 'http://localhost:8080' : window.location.origin;
        const backendBase = configuredBase || autoBase;

        const endpoints = [];

        // Prioridad 1: backend configurado o autodetectado
        endpoints.push(`${backendBase}/api/recaptcha-sitekey`);

        // Prioridad 2: Cloud Run directamente (como fallback seguro)
        endpoints.push('https://floria-backend-252448748566.us-central1.run.app/api/recaptcha-sitekey');

        // Prioridad 3: mismo origen (solo si no es GitHub Pages)
        if (!isGithubPages) {
          endpoints.push(`${window.location.origin}/api/recaptcha-sitekey`);
        }

        // Prioridad 3: desarrollo local
        if (isLocal) {
          endpoints.push('http://localhost:8080/api/recaptcha-sitekey');
        }

        // Prioridad 4: localhost para debugging rápido
        if (!isLocal) {
          endpoints.push('http://localhost:8080/api/recaptcha-sitekey');
        }

        let lastError = null;

        for (const endpoint of endpoints) {
          try {
            const resp = await fetch(endpoint, { cache: 'no-store' });
            if (!resp.ok) {
              lastError = new Error(`HTTP ${resp.status} en ${endpoint}`);
              continue;
            }
            const data = await resp.json();
            if (!data?.sitekey) {
              lastError = new Error(`Sitekey vacía en ${endpoint}`);
              continue;
            }
            recaptchaSiteKey = data.sitekey;
            return recaptchaSiteKey;
          } catch (err) {
            lastError = err;
          }
        }

        throw lastError || new Error('No se pudo obtener sitekey');
      }

      async function ensureRecaptchaLoaded() {
        const recaptchaContainer = document.getElementById('recaptcha-container');
        const recaptchaWidget = document.getElementById('recaptcha-widget');
        if (recaptchaContainer) recaptchaContainer.style.display = 'flex';
        setRecaptchaLoading(true, 'Cargando captcha, por favor espera...');

        try {
          await getRecaptchaSiteKey();
        } catch (e) {
          console.error('Error cargando sitekey de reCAPTCHA:', e);
          setRecaptchaLoading(false);
          if (recaptchaWidget) {
            recaptchaWidget.innerHTML = '<span style="color:red;font-size:14px;">No se pudo cargar la configuración del captcha. Verifica que el backend esté activo y que /api/recaptcha-sitekey responda.</span>';
          }
          return;
        }

        if (window.grecaptcha) {
          loadRecaptcha();
          return;
        }

        if (document.getElementById('recaptcha-script')) {
          recaptchaScriptRequested = true;
          loadRecaptcha();
          return;
        }

        if (recaptchaScriptRequested) return;
        recaptchaScriptRequested = true;

        const recaptchaScript = document.createElement('script');
        recaptchaScript.id = 'recaptcha-script';
        recaptchaScript.src = 'https://www.google.com/recaptcha/api.js';
        recaptchaScript.async = true;
        recaptchaScript.defer = true;
        recaptchaScript.onload = () => loadRecaptcha();
        document.body.appendChild(recaptchaScript);
      }

      function loadRecaptcha(attempt=0) {
        const getRecaptchaApi = () => {
          if (!window.grecaptcha) return null;
          if (typeof window.grecaptcha.render === 'function') {
            return {
              render: (id, opts) => window.grecaptcha.render(id, opts),
              getResponse: (widgetId) => window.grecaptcha.getResponse(widgetId),
              reset: (widgetId) => window.grecaptcha.reset(widgetId),
            };
          }
          if (window.grecaptcha.enterprise && typeof window.grecaptcha.enterprise.render === 'function') {
            return {
              render: (id, opts) => window.grecaptcha.enterprise.render(id, opts),
              getResponse: (widgetId) => window.grecaptcha.enterprise.getResponse(widgetId),
              reset: (widgetId) => window.grecaptcha.enterprise.reset(widgetId),
            };
          }
          return null;
        };

        // Forzar visibilidad y tamaño correcto
        const recaptchaContainer = document.getElementById('recaptcha-container');
        const recaptchaWidget = document.getElementById('recaptcha-widget');
        if (recaptchaContainer) {
          recaptchaContainer.style.display = 'flex';
          recaptchaContainer.style.justifyContent = 'center';
          recaptchaContainer.style.alignItems = 'center';
          recaptchaContainer.style.minHeight = '78px';
        }
        if (recaptchaWidget) {
          recaptchaWidget.style.width = '100%';
          recaptchaWidget.style.maxWidth = '320px';
          recaptchaWidget.style.minWidth = '180px';
          recaptchaWidget.style.display = 'flex';
          recaptchaWidget.style.justifyContent = 'center';
        }
        const recaptchaApi = getRecaptchaApi();
        if (recaptchaApi) {
          if (recaptchaWidgetId === null) {
            if (!recaptchaSiteKey) {
              setRecaptchaLoading(false);
              if (recaptchaWidget) recaptchaWidget.innerHTML = '<span style="color:red;font-size:14px;">Sitekey de captcha no disponible.</span>';
              return;
            }
            recaptchaWidgetId = recaptchaApi.render('recaptcha-widget', {
              'sitekey': recaptchaSiteKey,
              'theme': 'light'
            });
            setRecaptchaLoading(false);
          } else {
            setRecaptchaLoading(false);
          }
        } else {
          // Si tras 10 intentos (5s) no carga, muestra mensaje de error
          if (attempt > 10) {
            setRecaptchaLoading(false);
            if (recaptchaWidget) recaptchaWidget.innerHTML = '<span style="color:red;font-size:14px;">No se pudo inicializar el captcha. Refresca la página.</span>';
            return;
          }
          setTimeout(()=>loadRecaptcha(attempt+1), 500);
        }
      }
      // reCAPTCHA se carga bajo demanda cuando el chat se abre

      iaChatInput.addEventListener('submit', async function(e) {
        e.preventDefault();
        if (chatProcessing) return;
        chatProcessing = true;
        iaSubmitBtn.disabled = true;
        const val = iaInput.value.trim();
        if(!val) {
          chatProcessing = false;
          iaSubmitBtn.disabled = false;
          return;
        }
        // Solo pedir captcha en el primer mensaje, luego marcar como validado permanentemente
        let recaptchaToken = null;
        if (!captchaValidated) {
          try {
            if (window.grecaptcha && recaptchaWidgetId !== null) {
              if (typeof window.grecaptcha.getResponse === 'function') {
                recaptchaToken = window.grecaptcha.getResponse(recaptchaWidgetId);
              } else if (window.grecaptcha.enterprise && typeof window.grecaptcha.enterprise.getResponse === 'function') {
                recaptchaToken = window.grecaptcha.enterprise.getResponse(recaptchaWidgetId);
              }
            }
          } catch (err) {
            appendMsg('Error al obtener el captcha. Intenta de nuevo.', 'bot');
            chatProcessing = false;
            iaSubmitBtn.disabled = false;
            return;
          }
          if (!recaptchaToken) {
            appendMsg('Por favor completa el captcha antes de enviar.', 'bot');
            chatProcessing = false;
            iaSubmitBtn.disabled = false;
            return;
          }
        }
        appendMsg(val, 'user');
        iaInput.value = '';
        // Add user message to chatHistory
        chatHistory.push({ role: 'user', parts: [{ text: val }] });
        // Limit to last 10 messages (excluding SYSTEM_INSTRUCTION)
        if (chatHistory.length > 11) {
          chatHistory = [chatHistory[0], ...chatHistory.slice(-10)];
        }
        // Feedback visual: FlorIA está pensando...
        let thinkingDiv = document.createElement('div');
        thinkingDiv.style.display = 'flex';
        thinkingDiv.style.width = '100%';
        thinkingDiv.style.marginBottom = '0.1em';
        thinkingDiv.style.justifyContent = 'flex-start';
        let thinkingBubble = document.createElement('span');
        thinkingBubble.style.display = 'inline-block';
        thinkingBubble.style.padding = '0.5em 1em';
        thinkingBubble.style.borderRadius = '1em';
        thinkingBubble.style.maxWidth = '80%';
        thinkingBubble.style.wordBreak = 'break-word';
        thinkingBubble.style.boxSizing = 'border-box';
        setBubbleStyle(thinkingBubble, 'bot');
        thinkingBubble.textContent = 'FlorIA está pensando...';
        thinkingBubble.setAttribute('data-from', 'bot');
        thinkingBubble.setAttribute('data-thinking', 'true');
        thinkingDiv.appendChild(thinkingBubble);
        iaChatMessages.appendChild(thinkingDiv);
        iaChatMessages.scrollTop = iaChatMessages.scrollHeight;

        try {
          const configuredBase = (window.WEBSPTY_API_BASE || '').trim().replace(/\/$/, '');
          const apiBase = configuredBase || (
            (!window.location.hostname || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
              ? 'http://localhost:8080'
              : window.location.origin
          );
          const apiUrl = `${apiBase}/api/chat`;
          const resp = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-session-id': sessionId
            },
            body: JSON.stringify({ history: chatHistory, recaptchaToken })
          });
          const data = await resp.json();
          if (thinkingDiv.parentNode === iaChatMessages) {
            iaChatMessages.removeChild(thinkingDiv);
          }
          if (!captchaValidated) {
            if (window.grecaptcha && recaptchaWidgetId !== null) {
              if (typeof window.grecaptcha.reset === 'function') {
                window.grecaptcha.reset(recaptchaWidgetId);
              } else if (window.grecaptcha.enterprise && typeof window.grecaptcha.enterprise.reset === 'function') {
                window.grecaptcha.enterprise.reset(recaptchaWidgetId);
              }
            }
            // Si el captcha fue válido, ocultar el widget y marcar validado para toda la sesión
            if (resp.ok && data.response) {
              captchaValidated = true;
              const recaptchaContainer = document.getElementById('recaptcha-container');
              if (recaptchaContainer) recaptchaContainer.style.display = 'none';
            }
          }
          if (resp.ok && data.response) {
            await appendMsg(data.response, 'bot', { typing: true, speed: 15 });
            // Add bot response to chatHistory
            chatHistory.push({ role: 'model', parts: [{ text: data.response }] });
            if (chatHistory.length > 11) {
              chatHistory = [chatHistory[0], ...chatHistory.slice(-10)];
            }
          } else if (data.error) {
            appendMsg(data.error, 'bot');
          } else {
            appendMsg('FlorIA no pudo responder en este momento. Intenta de nuevo más tarde.', 'bot');
          }
        } catch (err) {
          if (thinkingDiv.parentNode === iaChatMessages) {
            iaChatMessages.removeChild(thinkingDiv);
          }
          appendMsg('FlorIA no pudo responder en este momento. Intenta de nuevo más tarde.', 'bot');
        }
        chatProcessing = false;
        iaSubmitBtn.disabled = false;
      });

      function setBubbleStyle(bubble, from) {
        if (from === 'user') {
          bubble.style.background = '#6366f1';
          bubble.style.color = '#fff';
        } else {
          if (document.documentElement.classList.contains('dark')) {
            bubble.style.background = '#23232b';
            bubble.style.color = '#e5e7eb';
          } else {
            bubble.style.background = '#f1f5f9';
            bubble.style.color = '#222';
          }
        }
      }

      function escapeHTML(str) {
        return str.replace(/[&<>'"`]/g, function (c) {
          return ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;',
            '`': '&#96;'
          })[c];
        });
      }

      async function appendMsg(msg, from, options = {}) {
        const { typing = false, speed = 18 } = options;
        const div = document.createElement('div');
        div.style.display = 'flex';
        div.style.width = '100%';
        div.style.marginBottom = '0.1em';
        div.style.justifyContent = from === 'user' ? 'flex-end' : 'flex-start';
        const bubble = document.createElement('span');
        bubble.style.display = 'inline-block';
        bubble.style.padding = '0.5em 1em';
        bubble.style.borderRadius = '1em';
        bubble.style.maxWidth = '80%';
        bubble.style.wordBreak = 'break-word';
        bubble.style.boxSizing = 'border-box';
        setBubbleStyle(bubble, from);
        bubble.textContent = '';
        // Guardar el tipo de burbuja para actualización
        bubble.setAttribute('data-from', from);
        div.appendChild(bubble);
        iaChatMessages.appendChild(div);

        if (typing && from === 'bot') {
          const safeText = String(msg || '');
          for (const ch of safeText) {
            bubble.textContent += ch;
            iaChatMessages.scrollTop = iaChatMessages.scrollHeight;
            await new Promise(resolve => setTimeout(resolve, ch === ' ' ? Math.max(8, speed - 8) : speed));
          }
        } else {
          bubble.textContent = String(msg || '');
          iaChatMessages.scrollTop = iaChatMessages.scrollHeight;
        }
      }

      // Actualizar burbujas existentes al cambiar el modo
      function updateAllBubbles() {
        iaChatMessages.querySelectorAll('span[data-from]').forEach(bubble => {
          setBubbleStyle(bubble, bubble.getAttribute('data-from'));
        });
      }

      // Detectar cambio de modo oscuro
      const observer = new MutationObserver(() => {
        updateAllBubbles();
      });
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    });
  </script>
